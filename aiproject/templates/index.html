<!DOCTYPE html>
<html>
<head>
    <title>AI Summarizer & QA Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .user { align-self: flex-end; background: #dcf8c6; }
        .bot { align-self: flex-start; background: #e3e3ff; }
        textarea, input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }
        form { margin-top: 20px; }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #5b6ef5;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #3d4fd3; }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <h2>AI Summarizer & Question Answering</h2>

        <div class="chat-box">
            {% if input_text %}
                <div class="bubble user"><strong>You (Text):</strong><br>{{ input_text }}</div>
                <div class="bubble bot"><strong>BART Summary:</strong><br>{{ summary }}</div>
            {% endif %}

            {% if question %}
                <div class="bubble user"><strong>You (Question):</strong><br>{{ question }}</div>
                <div class="bubble bot"><strong>RoBERTa Answer:</strong><br>{{ answer }}</div>
            {% endif %}
        </div>

        <form method="POST">
            <label><strong>Summarize Text:</strong></label>
            <textarea name="input_text" placeholder="Paste your text here..."></textarea>
            <button type="submit">Summarize</button>
        </form>

        <form method="POST">
            <label><strong>Ask a Question about the above article:</strong></label>
            <input type="text" name="question" placeholder="Type your question..." required>
            <button type="submit">Ask</button>
        </form>
    </div>
</body>
</html>
