<!DOCTYPE html>
<html>
<head>
    <title>BART Summarizer Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        .chat-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px #ccc;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
        }
        .user {
            background: #e0f7fa;
            align-self: flex-start;
        }
        .bot {
            background: #d1c4e9;
            align-self: flex-end;
            margin-left: auto;
        }
        .upload-form {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>AI Summarizer Chat</h2>
        <form class="upload-form" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".pdf,.txt" required>
            <button type="submit">Upload & Summarize</button>
        </form>

        {% if original %}
            <div class="message user">
                <strong>You uploaded:</strong><br>
                {{ original[:1000] }}{% if original|length > 1000 %}...{% endif %}
            </div>
        {% endif %}

        {% if summary %}
            <div class="message bot">
                <strong>AI Summary:</strong><br>
                {{ summary }}
            </div>
        {% endif %}
    </div>
</body>
</html>
